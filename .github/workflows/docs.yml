name: Docs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,5 * * *'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: docs
    timeout-minutes: 60
    steps:
      - name: Eco-CI Init
        uses: green-coding-solutions/eco-ci-energy-estimation@main
        with:
          task: start-measurement
          co2-calculation-method: 'constant'
          co2-grid-intensity-constant: 231


      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: 'docs/requirements.txt'
      - name: Install system spell checker
        run: sudo apt update && sudo apt install -y aspell aspell-en
      - run: python -m pip install -r requirements.txt

      - name: Eco-CI Measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@main
        with:
          task: get-measurement
          label: 'setup'

      - name: Lint
        run: make lint
      - name: Eco-CI Measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@main
        with:
          task: get-measurement
          label: 'lint'

      - name: Black
        run: make black
      - name: Eco-CI Measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@main
        with:
          task: get-measurement
          label: 'black'

      - name: Spelling
        run: SPHINXOPTS="-q -W" make spelling
      - name: Eco-CI Measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@main
        with:
          task: get-measurement
          label: 'spelling'


      - name: Eco-CI Results
        uses: green-coding-solutions/eco-ci-energy-estimation@main
        with:
          task: display-results
